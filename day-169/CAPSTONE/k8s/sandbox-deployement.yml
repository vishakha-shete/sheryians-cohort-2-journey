apiVersion: apps/v1
kind: Deployment

metadata:
  name: sandbox-deployment
  labels:
    app: sandbox-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sandbox

  template:
    metadata:
      labels:
        app: sandbox

    spec:
      containers:
        - name: main-sandbox-container
          image: sandbox:latest
          imagePullPolicy: IfNotPresent

          resources:
            limits:
              cpu: "500m"
              memory: "400Mi"
            requests:
              cpu: "250m"
              memory: "200Mi"

          livenessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10

          readinessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10

          ports:
            - containerPort: 3000
              name: my-port